apiVersion: apps/v1
kind: Deployment
metadata:
  name: fractureiq-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fractureiq-api
  template:
    metadata:
      labels:
        app: fractureiq-api
    spec:
      containers:
        - name: api
          image: fractureiq/api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: 12Gi
            requests:
              cpu: "2"
              memory: 6Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fractureiq-api
spec:
  selector:
    app: fractureiq-api
  ports:
    - port: 8000
      targetPort: 8000

