apiVersion: apps/v1
kind: Deployment
metadata:
  name: fractureiq-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fractureiq-web
  template:
    metadata:
      labels:
        app: fractureiq-web
    spec:
      containers:
        - name: web
          image: fractureiq/web:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: fractureiq-web
spec:
  selector:
    app: fractureiq-web
  ports:
    - port: 3000
      targetPort: 3000

