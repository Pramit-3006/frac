apiVersion: apps/v1
kind: Deployment
metadata:
  name: fractureiq-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fractureiq-gateway
  template:
    metadata:
      labels:
        app: fractureiq-gateway
    spec:
      containers:
        - name: gateway
          image: fractureiq/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: AI_API_URL
              value: http://fractureiq-api:8000
---
apiVersion: v1
kind: Service
metadata:
  name: fractureiq-gateway
spec:
  selector:
    app: fractureiq-gateway
  ports:
    - port: 8080
      targetPort: 8080

