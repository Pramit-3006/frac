services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fractureiq:fractureiq@postgres:5432/fractureiq
      MONGODB_URI: mongodb://mongo:27017/fractureiq
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - mongo
      - redis

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    ports:
      - "8080:8080"
    environment:
      AI_API_URL: http://api:8000
      PORT: 8080
    depends_on:
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fractureiq
      POSTGRES_PASSWORD: fractureiq
      POSTGRES_DB: fractureiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data:
