datasets:
  - MURA
  - RSNA Bone Fracture Dataset
  - VinDr-CXR
  - MedPix
  - Custom hospital DICOM datasets
splitting:
  strategy: patient_level
  train: 0.7
  validation: 0.15
  test: 0.15
augmentation:
  radiographic_windowing: true
  clahe: true
  rotation_degrees: 12
  random_crop: true
  noise_simulation: true
optimization:
  mixed_precision: true
  export_formats:
    - torchscript
    - onnx
    - tensorrt
tracking:
  metrics:
    - mAP50
    - mAP50-95
    - Dice
    - IoU
    - sensitivity
    - specificity
    - calibration_error

